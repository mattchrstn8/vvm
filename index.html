<!DOCTYPE html>
<html lang="en">
<head>

  <title>Poster Slideshow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="slider">

    <div class="slide">
      <img src="photo/67.png" alt="Poster 3">

</div>

<script src="index.js"></script>

</html>
